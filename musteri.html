<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>MEER'S Menü</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--al:#D4A017;--aac:#F0C040;--bas:#2D6A2D;--bac:#E8F5E8;--teh:#C0392B;--tac:#FDECEA;--uya:#E8952A;--s:#1A1A1A;--sm:#2C2C2C;--si:#9A7B65;--kr:#FDF6EE;--bd:#EDD9C0;--yz:#FFF8F2;--ik:#F5E6D3}
body{font-family:-apple-system,sans-serif;background:var(--kr);max-width:480px;margin:0 auto;min-height:100vh}
#giris{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1A1A1A,#2C2C2C);padding:20px}
.gb{background:var(--yz);border-radius:20px;padding:28px;width:100%;max-width:340px;border:1px solid var(--bd)}
.gb-logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#1A1A1A,#2C2C2C);border:2px solid var(--al);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 12px}
.gb-t{font-size:20px;font-weight:800;color:var(--s);text-align:center;margin-bottom:4px}
.gb-a{font-size:12px;color:var(--si);text-align:center;margin-bottom:20px}
.inp{width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--bd);font-size:14px;color:var(--s);background:var(--yz);outline:none;margin-bottom:10px}
.inp:focus{border-color:var(--al)}
.gb-btn{width:100%;padding:14px;border-radius:13px;background:linear-gradient(135deg,#1A1A1A,#2C2C2C);color:var(--al);border:1.5px solid var(--al);font-size:14px;font-weight:700;cursor:pointer}
#panel{display:none;flex-direction:column;min-height:100vh}
.hdr{background:linear-gradient(135deg,#1A1A1A,#2C2C2C);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:2px solid var(--al)}
.hdr-t{font-size:15px;font-weight:800;color:#fff}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
.puan-chip{background:rgba(212,160,23,.15);border:1px solid rgba(212,160,23,.3);border-radius:10px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--al);display:none}
.kamp-bar{display:none;padding:10px 14px;background:linear-gradient(135deg,#C0392B,#a93226);color:#fff;text-align:center}
.kamp-bar-ic{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.kamp-bar-t{font-size:13px;font-weight:700}
.kamp-bar-sayac{font-size:14px;font-weight:800;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:8px}
.kat-bar{overflow-x:auto;white-space:nowrap;padding:10px 12px;background:var(--yz);border-bottom:1px solid var(--bd)}
.kat-bar::-webkit-scrollbar{display:none}
.kat-btn{display:inline-block;padding:7px 14px;border-radius:20px;border:1.5px solid var(--bd);font-size:12px;font-weight:700;cursor:pointer;margin-right:6px;background:var(--yz);color:var(--si)}
.kat-btn.ak{background:var(--s);color:var(--al);border-color:var(--s)}
.combo-kutu{display:none;padding:10px 12px;background:linear-gradient(135deg,rgba(45,106,45,.08),rgba(45,106,45,.03));border-bottom:1px solid rgba(45,106,45,.15)}
.combo-k{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--yz);border-radius:12px;border:1.5px solid rgba(45,106,45,.25);margin-bottom:6px;cursor:pointer}
.combo-k:last-child{margin-bottom:0}
.menu-ic{padding:10px}
.ak-blok{margin-bottom:6px}
.ak-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#2C2C2C;color:var(--al);font-size:13px;font-weight:700;border-radius:12px;cursor:pointer}
.ak-ok{font-size:11px}
.ak-ic{display:none;padding-top:6px}
.ak-ic.ak{display:block}
.urun{display:flex;align-items:center;gap:10px;padding:12px;background:var(--yz);border-radius:14px;border:1.5px solid var(--bd);margin-bottom:6px}
.urun.tukendi{opacity:.5}
.urun-em{font-size:24px;flex-shrink:0;width:52px;text-align:center}
.urun-img{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0}
.urun-bilgi{flex:1;min-width:0}
.urun-ad{font-size:13px;font-weight:700;color:var(--s);margin-bottom:3px}
.urun-alt{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.urun-fiyat{font-size:13px;font-weight:700;color:var(--al)}
.urun-kal{font-size:10px;color:var(--si);background:rgba(0,0,0,.06);padding:2px 6px;border-radius:5px}
.urun-tukendi-lbl{font-size:10px;color:var(--teh);font-weight:700;margin-top:2px}
.urun-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ctrl-btn{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--bd);background:var(--yz);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--s);font-weight:700}
.ctrl-btn.plus{background:var(--s);color:var(--al);border-color:var(--s)}
.ctrl-adet{font-size:13px;font-weight:800;color:var(--s);min-width:18px;text-align:center}
.fab{position:fixed;bottom:20px;right:16px;background:linear-gradient(135deg,var(--al),var(--aac));color:var(--s);border:none;border-radius:16px;padding:12px 18px;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(212,160,23,.4);display:none;z-index:40}
.fab.ak{display:block}
#sepet{display:none;flex-direction:column;min-height:100vh}
.sep-hdr{background:linear-gradient(135deg,#1A1A1A,#2C2C2C);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--al)}
.sep-hdr-t{font-size:15px;font-weight:800;color:#fff}
.geri{padding:6px 12px;border-radius:8px;background:rgba(255,255,255,.12);color:#fff;border:none;font-size:12px;cursor:pointer}
.sep-ic{padding:10px;flex:1}
.sep-satir{display:flex;align-items:center;gap:10px;padding:10px;background:var(--yz);border-radius:12px;border:1px solid var(--bd);margin-bottom:6px}
.sep-em{font-size:20px;flex-shrink:0}
.sep-ad{font-size:13px;font-weight:700;color:var(--s);flex:1}
.sep-adet{font-size:11px;color:var(--si)}
.sep-fiyat{font-size:14px;font-weight:800;color:var(--al)}
.sep-sil{background:var(--tac);border:none;border-radius:8px;color:var(--teh);font-size:12px;cursor:pointer;padding:4px 8px}
.sep-alt{padding:12px;background:var(--yz);border-top:2px solid var(--bd)}
.kal-chip{display:none;text-align:center;font-size:12px;color:var(--si);padding:6px;background:rgba(0,0,0,.03);border-radius:8px;margin-bottom:8px}
.toplam-satir{display:flex;justify-content:space-between;font-size:18px;font-weight:800;color:var(--s);margin-bottom:10px}
.puan-kutu{display:none;background:var(--uac);border-radius:12px;padding:10px;margin-bottom:10px;border:1px solid var(--uya)}
.puan-lbl{font-size:11px;color:var(--uya);font-weight:700;margin-bottom:6px}
.not-inp{width:100%;padding:10px;border-radius:10px;border:1.5px solid var(--bd);font-size:13px;margin-bottom:10px;color:var(--s);background:var(--yz);outline:none}
.siparis-btn{width:100%;padding:15px;border-radius:15px;background:linear-gradient(135deg,var(--al),var(--aac));color:var(--s);border:none;font-size:15px;font-weight:800;cursor:pointer}
#takip{display:none;flex-direction:column;min-height:100vh;background:linear-gradient(135deg,#1A1A1A,#2C2C2C)}
.tak-hdr{padding:16px;text-align:center;border-bottom:1px solid rgba(212,160,23,.2)}
.tak-t{font-size:16px;font-weight:800;color:#fff;margin-bottom:4px}
.tak-a{font-size:12px;color:rgba(255,255,255,.5)}
.puan-toast{display:none;background:rgba(45,106,45,.2);border:1px solid #2D6A2D;border-radius:12px;padding:10px;margin:12px 16px 0;text-align:center}
.pt-s{font-size:20px;font-weight:800;color:#6fcf6f}
.pt-a{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}
.cark-kutu{display:none;padding:12px 16px;background:linear-gradient(135deg,#1a1a2e,#0f3460);margin:12px 16px 0;border-radius:16px;border:1px solid rgba(212,160,23,.3);text-align:center}
.cark-t{font-size:12px;font-weight:700;color:var(--al);margin-bottom:8px}
.cark-btn{width:100%;padding:12px;border-radius:12px;background:linear-gradient(135deg,var(--al),var(--aac));color:var(--s);border:none;font-size:14px;font-weight:800;cursor:pointer}
.adim-list{padding:16px}
.adim{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;margin-bottom:8px;border:1px solid rgba(255,255,255,.08)}
.adim.ak{background:rgba(212,160,23,.1);border-color:rgba(212,160,23,.3)}
.adim.tamam{background:rgba(45,106,45,.1);border-color:rgba(45,106,45,.3)}
.adim.bekl{opacity:.35}
.adim-em{font-size:22px;flex-shrink:0}
.adim-t{font-size:13px;font-weight:700;color:#fff;flex:1}
.adim-dur{font-size:16px;color:rgba(255,255,255,.3)}
.adim.ak .adim-dur{color:var(--al)}
.adim.tamam .adim-dur{color:#6fcf6f}
.yeni-btn{margin:16px;padding:14px;border-radius:14px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15);font-size:14px;font-weight:700;cursor:pointer;width:calc(100% - 32px)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;border:1px solid var(--al);max-width:85vw;text-align:center;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
</style>
</head>
<body>
<div id="giris">
  <div class="gb">
    <div class="gb-logo">🍽️</div>
    <div class="gb-t" id="gb-restoran">MEER'S</div>
    <div class="gb-a" id="gb-masa">Masa —</div>
    <input class="inp" id="tel-inp" type="tel" placeholder="Telefon numaranız (05XX...)" maxlength="11" onkeydown="if(event.key==='Enter')girisYap()">
    <button class="gb-btn" onclick="girisYap()">Menüyü Gör →</button>
  </div>
</div>
<div id="panel">
  <div class="hdr">
    <div><div class="hdr-t" id="hdr-restoran">MEER'S</div><div class="hdr-sub" id="hdr-masa">Masa —</div></div>
    <div class="puan-chip" id="puan-chip">⭐ <span id="puan-say">0</span></div>
  </div>
  <div class="kamp-bar" id="kamp-bar">
    <div class="kamp-bar-ic">
      <div class="kamp-bar-t" id="kamp-bar-txt">🔥 Kampanya!</div>
      <div class="kamp-bar-sayac" id="kamp-bar-sayac"></div>
    </div>
  </div>
  <div class="kat-bar" id="kat-bar"></div>
  <div class="combo-kutu" id="combo-kutu"></div>
  <div class="menu-ic" id="menu-ic"></div>
  <button class="fab" id="fab" onclick="sepetAc()">🛒 <span id="fab-say">0</span> ürün · ₺<span id="fab-top">0</span></button>
</div>
<div id="sepet">
  <div class="sep-hdr"><div class="sep-hdr-t">🛒 Sepet</div><button class="geri" onclick="sepetKapat()">← Geri</button></div>
  <div class="sep-ic" id="sep-ic"></div>
  <div class="sep-alt">
    <div class="kal-chip" id="kal-chip"></div>
    <div class="toplam-satir"><span>Toplam</span><span id="toplam-txt">₺0</span></div>
    <div class="puan-kutu" id="puan-kutu">
      <div class="puan-lbl">⭐ Puan Kullan (<span id="puan-maks">0</span> puan)</div>
      <input type="range" id="puan-range" min="0" max="0" value="0" style="width:100%" oninput="puanDegis(this)">
      <div style="font-size:11px;color:var(--uya);margin-top:4px" id="puan-ind-txt">₺0 indirim</div>
    </div>
    <input class="not-inp" id="not-inp" placeholder="Sipariş notu (isteğe bağlı)">
    <button class="siparis-btn" onclick="siparisVer()">✅ Siparişi Onayla</button>
  </div>
</div>
<div id="takip">
  <div class="tak-hdr"><div class="tak-t">Sipariş Verildi! 🎉</div><div class="tak-a" id="tak-a">Hazırlanıyor...</div></div>
  <div class="puan-toast" id="puan-toast"><div class="pt-s" id="pt-s">+0 ⭐</div><div class="pt-a">Puan kazandınız!</div></div>
  <div class="cark-kutu" id="cark-kutu"><div class="cark-t">🎡 Şans Çarkı Hakkın Var!</div><button class="cark-btn" onclick="carkAc()">🎡 Çarkı Çevir → İndirim Kazan!</button></div>
  <div class="adim-list" id="adim-list"></div>
  <button class="yeni-btn" onclick="yeniSiparis()">+ Yeni Sipariş</button>
</div>
<div class="toast" id="toast"></div>
<script>

var SURL="https://vdrjyngywjzuniwvsjtk.supabase.co",SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg";
var SH={"apikey":SKEY,"Authorization":"Bearer "+SKEY,"Content-Type":"application/json"};
async function sbGet(t,q){try{var r=await fetch(SURL+"/rest/v1/"+t+"?"+(q||""),{headers:SH});return r.ok?r.json():[]}catch(e){return[]}}
async function sbPost(t,d){try{var r=await fetch(SURL+"/rest/v1/"+t,{method:"POST",headers:Object.assign({},SH,{"Prefer":"return=representation"}),body:JSON.stringify(d)});return r.json()}catch(e){return null}}
async function sbPatch(t,q,d){try{var r=await fetch(SURL+"/rest/v1/"+t+"?"+q,{method:"PATCH",headers:Object.assign({},SH,{"Prefer":"return=representation"}),body:JSON.stringify(d)});return r.json()}catch(e){return null}}

var masaNo=parseInt(new URLSearchParams(location.search).get("masa"))||0;
var musteri=null,MENU=[],STOK_BITEN=[],SEPET={},aktifKat="Tumu",kulPuan=0,polling=null;
var KAMPANYA=null,COMBOLAR=[];

document.getElementById("gb-masa").textContent="Masa "+masaNo;

async function girisYap(){
  var tel=document.getElementById("tel-inp").value.trim();
  if(!tel||tel.length<10){toast("Gecerli telefon girin");return;}
  var md=await sbGet("musteriler","tel=eq."+tel);
  if(!md||!md.length){await sbPost("musteriler",{tel:tel,puan:0,seviye:1,ziyaret:0});md=await sbGet("musteriler","tel=eq."+tel);}
  musteri=(md&&md.length)?md[0]:{tel:tel,puan:0};
  if(musteri.puan>0){document.getElementById("puan-chip").style.display="block";document.getElementById("puan-say").textContent=musteri.puan;}
  var ay=await sbGet("ayarlar","key=eq.restoran_bilgi");
  if(ay&&ay.length&&ay[0].value){var ad=ay[0].value.ad||"MEER'S";document.getElementById("gb-restoran").textContent=ad;document.getElementById("hdr-restoran").textContent=ad;document.title=ad+" Menu";}
  document.getElementById("hdr-masa").textContent="Masa "+masaNo;
  await kampanyaYukle();
  await comboYukle();
  await menuYukle();
  await stokYukle();
  document.getElementById("giris").style.display="none";
  document.getElementById("panel").style.display="flex";
  document.getElementById("panel").style.flexDirection="column";
}

async function kampanyaYukle(){
  KAMPANYA=null;
  var d=await sbGet("ayarlar","key=eq.kampanya");
  if(!d||!d.length||!d[0].value)return;
  var k=d[0].value;
  if(!k.aktif)return;
  var bitis=new Date(k.bitis);
  if(bitis<new Date())return;
  KAMPANYA=k;
  var bar=document.getElementById("kamp-bar");
  if(bar){
    bar.style.display="block";
    document.getElementById("kamp-bar-txt").textContent="🔥 "+k.mesaj+" — %"+k.oran+" indirim!";
    var timer=setInterval(function(){
      var kalan=Math.max(0,Math.floor((bitis-new Date())/1000));
      if(kalan<=0){clearInterval(timer);bar.style.display="none";KAMPANYA=null;renderMenu();return;}
      var dk=Math.floor(kalan/60),sn=kalan%60;
      document.getElementById("kamp-bar-sayac").textContent=dk+":"+String(sn).padStart(2,"0");
    },1000);
  }
}

async function comboYukle(){
  COMBOLAR=[];
  var d=await sbGet("ayarlar","key=eq.combo_menu");
  if(!d||!d.length||!d[0].value)return;
  COMBOLAR=d[0].value.combolar||[];
}

async function menuYukle(){
  var data=await sbGet("menu","aktif=eq.true&order=kat.asc,ad.asc");
  if(data&&data.length)MENU=data;
  renderKatlar();
  renderMenu();
}

async function stokYukle(){
  var data=await sbGet("stok","order=ad.asc");
  if(!data)return;
  STOK_BITEN=[];
  data.forEach(function(s){if(parseFloat(s.miktar)<=parseFloat(s.sinir||0))STOK_BITEN.push(s.ad);});
}

function renderKatlar(){
  var katlar=["Tumu"];
  MENU.forEach(function(u){if(katlar.indexOf(u.kat)<0)katlar.push(u.kat);});
  var emler={"Tumu":"🍽️","Izgara":"🥩","Pide":"🫓","Corbalar":"🍲","Tatlilar":"🍮","Icecekler":"🥤"};
  document.getElementById("kat-bar").innerHTML=katlar.map(function(k){
    return '<div class="kat-btn'+(k===aktifKat?" ak":"")+'" data-kat="'+k+'" onclick="katSec(this.dataset.kat)">'+(emler[k]||"🍽️")+" "+(k==="Tumu"?"Tümü":k)+"</div>";
  }).join("");
}

function katSec(kat){aktifKat=kat;renderKatlar();renderMenu();}

function kampFiyatHesapla(u){
  if(!KAMPANYA)return null;
  var kat=KAMPANYA.kat||"hepsi";
  if(kat!=="hepsi"&&u.kat!==kat)return null;
  return Math.round(u.fiyat*(1-KAMPANYA.oran/100));
}

function urunHTML(u){
  var tukendi=STOK_BITEN.indexOf(u.ad)>=0;
  var adet=SEPET[u.id]?SEPET[u.id].adet:0;
  var gorsel=u.image_url?'<img class="urun-img" src="'+u.image_url+'">':"<div class='urun-em'>"+(u.em||"🍽️")+"</div>";
  var kampF=kampFiyatHesapla(u);
  var fiyatHTML;
  if(kampF!==null){
    fiyatHTML='<div style="display:flex;align-items:center;gap:5px">'
      +'<div style="font-size:11px;color:#9A7B65;text-decoration:line-through">₺'+u.fiyat+'</div>'
      +'<div class="urun-fiyat" style="color:#C0392B">₺'+kampF+'</div>'
      +'<div style="font-size:10px;background:#C0392B;color:#fff;padding:1px 6px;border-radius:5px;font-weight:700">-%'+KAMPANYA.oran+'</div>'
      +'</div>';
  }else{
    fiyatHTML='<div class="urun-fiyat">₺'+u.fiyat+'</div>';
  }
  var kaloriHTML=u.kalori?'<div class="urun-kal">🔥'+u.kalori+'kcal</div>':"";
  var tukendiHTML=tukendi?'<div class="urun-tukendi-lbl">✕ Tükendi</div>':"";
  var ctrlHTML=tukendi?"":
    (adet>0?'<button class="ctrl-btn" data-id="'+u.id+'" onclick="azalt(this.dataset.id)">−</button><div class="ctrl-adet">'+adet+"</div>":"")
    +'<button class="ctrl-btn plus" data-id="'+u.id+'" onclick="ekle(this.dataset.id)">+</button>';
  return '<div class="urun'+(tukendi?" tukendi":"")+'">'
    +gorsel
    +'<div class="urun-bilgi">'
    +'<div class="urun-ad">'+u.ad+"</div>"
    +'<div class="urun-alt">'+fiyatHTML+kaloriHTML+"</div>"
    +tukendiHTML
    +"</div>"
    +'<div class="urun-ctrl">'+ctrlHTML+"</div>"
    +"</div>";
}

function renderMenu(){
  renderCombolar();
  var items=aktifKat==="Tumu"?MENU:MENU.filter(function(u){return u.kat===aktifKat;});
  if(aktifKat!=="Tumu"){document.getElementById("menu-ic").innerHTML=items.map(urunHTML).join("");return;}
  var katlar=[],katMap={};
  items.forEach(function(u){if(katlar.indexOf(u.kat)<0){katlar.push(u.kat);katMap[u.kat]=[];}katMap[u.kat].push(u);});
  var emler={"Izgara":"🥩","Pide":"🫓","Corbalar":"🍲","Tatlilar":"🍮","Icecekler":"🥤"};
  document.getElementById("menu-ic").innerHTML=katlar.map(function(k){
    return '<div class="ak-blok">'
      +'<div class="ak-hdr" onclick="akToggle(this)">'+(emler[k]||"🍽️")+" "+k+' <span class="ak-ok">▼</span></div>'
      +'<div class="ak-ic ak">'+katMap[k].map(urunHTML).join("")+"</div>"
      +"</div>";
  }).join("");
}

function renderCombolar(){
  var el=document.getElementById("combo-kutu");
  if(!el)return;
  if(!COMBOLAR.length){el.style.display="none";return;}
  el.style.display="block";
  el.innerHTML='<div style="font-size:12px;font-weight:700;color:#2D6A2D;margin-bottom:8px">🎁 Kombine Menü Fırsatları</div>'
    +COMBOLAR.map(function(c,i){
      return '<div class="combo-k" onclick="comboSepete('+i+')">'
        +'<div>'
        +'<div style="font-size:13px;font-weight:700;color:#1A1A1A">'+c.ad+'</div>'
        +'<div style="font-size:11px;color:#9A7B65;margin-top:2px">'+c.aciklama+'</div>'
        +'</div>'
        +'<div style="text-align:right;flex-shrink:0">'
        +(c.normalFiyat?'<div style="font-size:11px;color:#9A7B65;text-decoration:line-through">₺'+c.normalFiyat+'</div>':"")
        +'<div style="font-size:15px;font-weight:800;color:#2D6A2D">₺'+c.indirimFiyat+'</div>'
        +'<div style="font-size:10px;color:#fff;background:#2D6A2D;padding:2px 6px;border-radius:5px;margin-top:2px">Sepete Ekle +</div>'
        +"</div>"
        +"</div>";
    }).join("");
}

function comboSepete(idx){
  var c=COMBOLAR[idx];
  if(!c)return;
  var urunler=(c.urunler||[]).map(function(id){return MENU.find(function(m){return m.id===id;});}).filter(Boolean);
  if(!urunler.length){toast("Combo urunleri menude yok");return;}
  urunler.forEach(function(u){ekle(u.id);});
  renderMenu();
  guncelFab();
  toast("🎁 "+c.ad+" sepete eklendi!");
}

function akToggle(h){var ic=h.nextElementSibling;ic.classList.toggle("ak");h.querySelector(".ak-ok").textContent=ic.classList.contains("ak")?"▲":"▼";}

function ekle(id){
  var u=MENU.find(function(m){return m.id===id;});
  if(!u)return;
  var kampF=kampFiyatHesapla(u);
  var fiyat=kampF!==null?kampF:u.fiyat;
  if(!SEPET[id])SEPET[id]={id:u.id,ad:u.ad,em:u.em||"🍽️",fiyat:fiyat,kalori:u.kalori||0,adet:0};
  SEPET[id].adet++;
  renderMenu();
  guncelFab();
}

function azalt(id){
  if(!SEPET[id])return;
  SEPET[id].adet--;
  if(SEPET[id].adet<=0)delete SEPET[id];
  renderMenu();
  guncelFab();
}

function guncelFab(){
  var items=Object.values(SEPET).filter(function(u){return u.adet>0;});
  var say=items.reduce(function(s,u){return s+u.adet;},0);
  var top=items.reduce(function(s,u){return s+u.fiyat*u.adet;},0);
  document.getElementById("fab-say").textContent=say;
  document.getElementById("fab-top").textContent=top;
  document.getElementById("fab").className="fab"+(say>0?" ak":"");
}

function sepetAc(){renderSepet();document.getElementById("panel").style.display="none";document.getElementById("sepet").style.display="flex";document.getElementById("sepet").style.flexDirection="column";}
function sepetKapat(){document.getElementById("sepet").style.display="none";document.getElementById("panel").style.display="flex";document.getElementById("panel").style.flexDirection="column";}

function renderSepet(){
  var items=Object.values(SEPET).filter(function(u){return u.adet>0;});
  document.getElementById("sep-ic").innerHTML=items.map(function(u){
    return '<div class="sep-satir"><div class="sep-em">'+u.em+'</div><div style="flex:1"><div class="sep-ad">'+u.ad+'</div><div class="sep-adet">x'+u.adet+'</div></div><div class="sep-fiyat">₺'+(u.fiyat*u.adet)+'</div><button class="sep-sil" data-id="'+u.id+'" onclick="sepetCikar(this.dataset.id)">✕</button></div>';
  }).join("");
  var brutTop=items.reduce(function(s,u){return s+u.fiyat*u.adet;},0);
  document.getElementById("toplam-txt").textContent="₺"+(brutTop-kulPuan);
  var topKal=items.reduce(function(s,u){return s+(u.kalori||0)*u.adet;},0);
  var kalEl=document.getElementById("kal-chip");
  if(kalEl){kalEl.style.display=topKal>0?"block":"none";kalEl.textContent="🔥 Toplam "+topKal+" kcal";}
  if(musteri&&musteri.puan>0){
    document.getElementById("puan-kutu").style.display="block";
    var maks=Math.min(musteri.puan,Math.floor(brutTop/2));
    document.getElementById("puan-range").max=maks;
    document.getElementById("puan-range").value=kulPuan;
    document.getElementById("puan-maks").textContent=maks+" puan";
    document.getElementById("puan-ind-txt").textContent="₺"+kulPuan+" indirim";
  }
}

function sepetCikar(id){delete SEPET[id];renderSepet();renderMenu();guncelFab();}
function puanDegis(inp){kulPuan=parseInt(inp.value)||0;renderSepet();}

async function siparisVer(){
  var items=Object.values(SEPET).filter(function(u){return u.adet>0;});
  if(!items.length){toast("Sepet bos!");return;}
  var not=document.getElementById("not-inp").value.trim();
  var tel=musteri?musteri.tel:"";
  var brutTop=items.reduce(function(s,u){return s+u.fiyat*u.adet;},0);
  var toplam=brutTop-kulPuan;
  var urunler=items.map(function(u){return {id:u.id,ad:u.ad,em:u.em,fiyat:u.fiyat,adet:u.adet}});
  var spId="sp_"+Date.now();
  await sbPost("siparisler",{id:spId,masa_no:masaNo,musteri_tel:tel,urunler:urunler,not_text:not||"",toplam:toplam,durum:"yeni",garson_id:null,garson_ad:"-",created_at:new Date().toISOString(),updated_at:new Date().toISOString()});
  await sbPatch("masalar","no=eq."+masaNo,{durum:"dolu",toplam:toplam,updated_at:new Date().toISOString()});
  var kazPuan=Math.floor(toplam/10);
  if(musteri&&kazPuan>0)await sbPatch("musteriler","tel=eq."+tel,{puan:(musteri.puan||0)+kazPuan,updated_at:new Date().toISOString()});
  document.getElementById("sepet").style.display="none";
  document.getElementById("takip").style.display="flex";
  document.getElementById("takip").style.flexDirection="column";
  document.getElementById("tak-a").textContent="Masa "+masaNo+" · ₺"+toplam+" · "+items.length+" urun";
  if(kazPuan>0){document.getElementById("puan-toast").style.display="block";document.getElementById("pt-s").textContent="+"+kazPuan+" ⭐";}
  setTimeout(function(){document.getElementById("cark-kutu").style.display="block";},500);
  adimlar("yeni");
  if(polling)clearInterval(polling);
  polling=setInterval(function(){
    sbGet("siparisler","id=eq."+spId).then(function(d){
      if(d&&d.length){adimlar(d[0].durum);if(d[0].durum==="tamamlandi"){clearInterval(polling);polling=null;}}
    });
  },3000);
  SEPET={};kulPuan=0;guncelFab();
}

function adimlar(durum){
  var list=[{em:"✅",t:"Sipariş Alındı"},{em:"🍳",t:"Hazırlanıyor"},{em:"🔔",t:"Hazır"},{em:"🍽️",t:"Afiyet Olsun"}];
  var ak=0;
  if(durum==="hazirlaniyor"||durum==="islem")ak=1;
  else if(durum==="hazir")ak=2;
  else if(durum==="tamamlandi")ak=3;
  document.getElementById("adim-list").innerHTML=list.map(function(a,i){
    var cls=i<ak?"tamam":i===ak?"ak":"bekl";
    return '<div class="adim '+cls+'"><div class="adim-em">'+a.em+'</div><div class="adim-t">'+a.t+'</div><div class="adim-dur">'+(i<ak?"✓":i===ak?"●":"○")+"</div></div>";
  }).join("");
}

function yeniSiparis(){
  if(polling){clearInterval(polling);polling=null;}
  document.getElementById("takip").style.display="none";
  document.getElementById("panel").style.display="flex";
  document.getElementById("panel").style.flexDirection="column";
  document.getElementById("puan-toast").style.display="none";
  document.getElementById("cark-kutu").style.display="none";
  menuYukle();
}

function carkAc(){var tel=musteri?musteri.tel:"";window.open("cark.html?masa="+masaNo+"&tel="+encodeURIComponent(tel)+"&hak=1","_blank");}

var toastT;
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.style.opacity="1";clearTimeout(toastT);toastT=setTimeout(function(){t.style.opacity="0";},3000);}

</script>
</body>
</html>
