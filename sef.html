<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mutfak</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--al:#D4A017;--bas:#2D6A2D;--teh:#C0392B;--uya:#E8952A}
body{font-family:-apple-system,sans-serif;background:#111;color:#fff;min-height:100vh}
.hdr{background:#1a1a1a;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--al)}
.hdr-t{font-size:16px;font-weight:800}
.hdr-sag{display:flex;align-items:center;gap:10px}
.saat{font-size:20px;font-weight:800;color:var(--al)}
.sp-say{padding:4px 10px;border-radius:8px;background:rgba(212,160,23,.2);color:var(--al);font-size:12px;font-weight:700}
.stok-btn{padding:5px 10px;border-radius:8px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);font-size:11px;cursor:pointer}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;height:calc(100vh - 52px);overflow:hidden}
@media(max-width:600px){.cols{grid-template-columns:1fr;height:auto;overflow:auto}}
.col{display:flex;flex-direction:column;overflow:hidden}
.col-t{font-size:11px;font-weight:700;text-transform:uppercase;padding:8px 10px;border-radius:10px 10px 0 0;text-align:center}
.col-t.yeni{background:rgba(192,57,43,.3);color:#ff8a80}
.col-t.islem{background:rgba(232,149,42,.3);color:#ffcc80}
.col-ic{flex:1;overflow-y:auto;padding:6px}
.sp{border-radius:12px;padding:12px;margin-bottom:8px;border:2px solid}
.sp.yeni{background:rgba(192,57,43,.08);border-color:rgba(192,57,43,.5)}
.sp.islem{background:rgba(232,149,42,.08);border-color:rgba(232,149,42,.5)}
.sp-ust{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sp-masa{font-size:18px;font-weight:800}
.sp-dk{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:700}
.sp-dk.n{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
.sp-dk.u{background:rgba(232,149,42,.3);color:#ffcc80}
.sp-dk.k{background:rgba(192,57,43,.3);color:#ff8a80}
.sp-garson{font-size:10px;color:rgba(255,255,255,.5);margin-bottom:6px}
.sp-urun{font-size:12px;color:rgba(255,255,255,.8);line-height:1.6;margin-bottom:6px}
.sp-not{font-size:11px;color:var(--uya);margin-bottom:8px;background:rgba(232,149,42,.1);padding:4px 8px;border-radius:6px}
.sp-btn{width:100%;padding:9px;border-radius:9px;border:none;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px}
.sp-btn.basla{background:linear-gradient(135deg,var(--uya),#C87010);color:#fff}
.sp-btn.hazir{background:linear-gradient(135deg,var(--bas),#1E4D1E);color:#fff}
.bos{text-align:center;padding:30px;color:rgba(255,255,255,.3);font-size:13px}
.flash{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--bas);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:100;display:none;border:1px solid var(--al);max-width:90vw;text-align:center}
.stok-panel{position:fixed;right:0;top:0;width:300px;height:100vh;background:#1a1a1a;border-left:2px solid var(--al);padding:14px;overflow-y:auto;display:none;z-index:200}
.stok-panel.ak{display:block}
.stok-panel-t{font-size:14px;font-weight:800;color:var(--al);margin-bottom:12px;display:flex;justify-content:space-between}
.stok-satir{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.stok-inp{width:65px;padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:11px}
.stok-ekle-btn{padding:4px 8px;border-radius:6px;background:var(--bas);color:#fff;border:none;font-size:11px;cursor:pointer}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-t">👨‍🍳 Mutfak Ekranı</div>
    <div style="font-size:10px;color:rgba(255,255,255,.4)">3 sn güncellenir</div>
  </div>
  <div class="hdr-sag">
    <div class="sp-say" id="sp-say">0 sipariş</div>
    <button class="stok-btn" onclick="stokPanelToggle()">📦 Stok</button>
    <div class="saat" id="saat">00:00:00</div>
  </div>
</div>
<div class="cols">
  <div class="col">
    <div class="col-t yeni">🆕 YENİ SİPARİŞLER</div>
    <div class="col-ic" id="col-yeni"></div>
  </div>
  <div class="col">
    <div class="col-t islem">⏳ HAZIRLANIYOR</div>
    <div class="col-ic" id="col-islem"></div>
  </div>
</div>
<div class="flash" id="flash"></div>
<div class="stok-panel" id="stok-panel">
  <div class="stok-panel-t">
    <span>📦 Stok Girişi</span>
    <span onclick="stokPanelToggle()" style="cursor:pointer;color:rgba(255,255,255,.4)">✕</span>
  </div>
  <div id="stok-liste"></div>
</div>
<script>
const SB_URL="https://vdrjyngywjzuniwvsjtk.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg";
const SB={
  h:{"apikey":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg","Authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg","Content-Type":"application/json"},
  async get(t,q){try{const r=await fetch(SB_URL+"/rest/v1/"+t+"?"+(q||""),{headers:this.h});if(!r.ok)return[];return r.json()}catch(e){return[]}},
  async post(t,d){try{const r=await fetch(SB_URL+"/rest/v1/"+t,{method:"POST",headers:{...this.h,"Prefer":"return=representation"},body:JSON.stringify(d)});return r.json()}catch(e){return null}},
  async patch(t,q,d){try{const r=await fetch(SB_URL+"/rest/v1/"+t+"?"+q,{method:"PATCH",headers:{...this.h,"Prefer":"return=representation"},body:JSON.stringify(d)});return r.json()}catch(e){return null}},
  async del(t,q){try{await fetch(SB_URL+"/rest/v1/"+t+"?"+q,{method:"DELETE",headers:this.h})}catch(e){}}
};
function parseUrunler(u){if(!u)return[];if(typeof u==="string"){try{u=JSON.parse(u)}catch(e){return[]}}if(!Array.isArray(u))return[];return u.map(function(x){if(typeof x==="string")return{ad:x,adet:1,em:"",fiyat:0};return{ad:x.ad||"",adet:x.adet||1,em:x.em||"",fiyat:x.fiyat||0}})};

var siparisler = [];
var dbStok = [];

setInterval(function(){
  var n=new Date();
  var el=document.getElementById("saat");
  if(el) el.textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0")+":"+String(n.getSeconds()).padStart(2,"0");
},1000);

async function yukle(){
  var data=await SB.get("siparisler","durum=in.(yeni,hazirlaniyor,islem)&order=created_at.asc");
  if(!data) return;
  siparisler=data.map(function(s){
    var arr=parseUrunler(s.urunler);
    var masaAd=parseInt(s.masa_no)===0?(s.garson_ad||"Paket"):"Masa "+s.masa_no;
    return {
      id:String(s.id),
      masa:masaAd,
      garson:s.garson_ad||"-",
      durum:s.durum==="islem"?"islem":s.durum||"yeni",
      dk:Math.floor((Date.now()-new Date(s.created_at).getTime())/60000),
      urunler:arr,
      not:s.not_text||""
    };
  });
  render();
}

function render(){
  var yeni=siparisler.filter(function(s){return s.durum==="yeni";});
  var islem=siparisler.filter(function(s){return s.durum==="hazirlaniyor"||s.durum==="islem";});
  document.getElementById("sp-say").textContent=(yeni.length+islem.length)+" siparis";
  document.getElementById("col-yeni").innerHTML=yeni.length?yeni.map(spHTML).join(""):"<div class='bos'>Yeni siparis yok ✅</div>";
  document.getElementById("col-islem").innerHTML=islem.length?islem.map(spHTML2).join(""):"<div class='bos'>Hazirlaniyor yok</div>";
}

function spHTML(s){
  var dkCls=s.dk>=15?"k":s.dk>=8?"u":"n";
  var urunHtml=s.urunler.map(function(u){return"<div>"+(u.em?u.em+" ":"")+u.ad+" <b>x"+u.adet+"</b></div>";}).join("");
  return "<div class='sp yeni' id='sp-"+s.id+"'>"
    +"<div class='sp-ust'><div class='sp-masa'>"+s.masa+"</div><div class='sp-dk "+dkCls+"'>"+s.dk+" dk</div></div>"
    +"<div class='sp-garson'>"+s.garson+"</div>"
    +(urunHtml?"<div class='sp-urun'>"+urunHtml+"</div>":"")
    +(s.not?"<div class='sp-not'>"+s.not+"</div>":"")
    +"<button class='sp-btn basla' data-id='"+s.id+"' onclick='basla(this)'>▶ Hazirlamaya Basla</button>"
    +"</div>";
}

function spHTML2(s){
  var dkCls=s.dk>=15?"k":s.dk>=8?"u":"n";
  var urunHtml=s.urunler.map(function(u){return"<div>"+(u.em?u.em+" ":"")+u.ad+" <b>x"+u.adet+"</b></div>";}).join("");
  return "<div class='sp islem' id='sp-"+s.id+"'>"
    +"<div class='sp-ust'><div class='sp-masa'>"+s.masa+"</div><div class='sp-dk "+dkCls+"'>"+s.dk+" dk</div></div>"
    +"<div class='sp-garson'>"+s.garson+"</div>"
    +(urunHtml?"<div class='sp-urun'>"+urunHtml+"</div>":"")
    +(s.not?"<div class='sp-not'>"+s.not+"</div>":"")
    +"<button class='sp-btn hazir' data-id='"+s.id+"' data-masa='"+s.masa+"' onclick='hazir(this)'>✅ Hazir - Servise Gonder</button>"
    +"</div>";
}

async function basla(btn){
  var id=btn.getAttribute("data-id");
  btn.disabled=true;
  btn.textContent="Kaydediliyor...";
  await SB.patch("siparisler","id=eq."+id,{durum:"hazirlaniyor",updated_at:new Date().toISOString()});
  flash("Hazirlaniyor...");
  await yukle();
}

async function hazir(btn){
  var id=btn.getAttribute("data-id");
  var masa=btn.getAttribute("data-masa");
  btn.disabled=true;
  btn.textContent="Kaydediliyor...";
  await SB.patch("siparisler","id=eq."+id,{durum:"hazir",updated_at:new Date().toISOString()});
  if(masa&&!masa.includes("Paket")&&!masa.includes("Gel")){
    var masaNo=masa.replace("Masa ","");
    await SB.patch("masalar","no=eq."+masaNo,{durum:"hazir",updated_at:new Date().toISOString()});
  }
  flash(masa+" HAZIR! Garson bildirildi 🔔");
  await yukle();
}

var flashT;
function flash(msg){
  var el=document.getElementById("flash");
  el.textContent=msg;el.style.display="block";
  clearTimeout(flashT);
  flashT=setTimeout(function(){el.style.display="none";},3000);
}

// STOK
var stokPanelAk=false;
var dbStokListesi=[];

function stokPanelToggle(){
  stokPanelAk=!stokPanelAk;
  document.getElementById("stok-panel").classList.toggle("ak",stokPanelAk);
  if(stokPanelAk) stokYukle();
}

async function stokYukle(){
  var data=await SB.get("stok","order=ad.asc");
  if(data) dbStokListesi=data;
  stokRender();
}

function stokRender(){
  var el=document.getElementById("stok-liste");
  if(!dbStokListesi.length){el.innerHTML="<div style='color:rgba(255,255,255,.4);font-size:12px;padding:10px'>Stok yok</div>";return;}
  var html="";
  dbStokListesi.forEach(function(s){
    var kritik=parseFloat(s.miktar)<=parseFloat(s.sinir||0);
    var safeId=s.ad.replace(/[^a-zA-Z0-9]/g,"_");
    html+="<div class='stok-satir'>"
      +"<span style='font-size:16px'>"+(s.em||"📦")+"</span>"
      +"<div style='flex:1'><div style='font-size:12px;font-weight:600;color:"+(kritik?"#ff8a80":"#fff")+"'>"+s.ad+"</div>"
      +"<div style='font-size:10px;color:rgba(255,255,255,.4)'>"+s.miktar+" "+s.birim+"</div></div>"
      +"<input class='stok-inp' id='sinp_"+safeId+"' type='number' min='0' step='0.1' placeholder='Ekle'>"
      +"<button class='stok-ekle-btn' data-ad='"+s.ad+"' data-inp='sinp_"+safeId+"' onclick='stokEkle(this)'>+</button>"
      +"</div>";
  });
  el.innerHTML=html;
}

async function stokEkle(btn){
  var ad=btn.getAttribute("data-ad");
  var inpId=btn.getAttribute("data-inp");
  var inp=document.getElementById(inpId);
  if(!inp) return;
  var miktar=parseFloat(inp.value);
  if(!miktar||miktar<=0) return;
  var stok=dbStokListesi.find(function(s){return s.ad===ad;});
  if(!stok) return;
  var yeni=parseFloat(stok.miktar)+miktar;
  await SB.patch("stok","ad=eq."+encodeURIComponent(ad),{miktar:yeni,updated_at:new Date().toISOString()});
  inp.value="";
  flash(ad+" stoku guncellendi: "+yeni);
  await stokYukle();
}

yukle();
setInterval(yukle,3000);
</script>
</body>
</html>
