<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lezzet Kebap \— \Şef Ekran\ı</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --s:#1A1A1A;--sm:#2C2C2C;--s3:#3A3A3A;
  --altin:#D4A017;--aac:#F0C040;
  --vurgu:#C8420A;--yesil:#2D6A2D;
  --kirmizi:#C0392B;--uyari:#E8952A;
  --b:rgba(212,160,23,.2);--metin:#F5F0E8;--silik:#9A8870;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--s);color:var(--metin);display:flex;flex-direction:column}
.topbar{background:linear-gradient(135deg,#0D0D0D,var(--sm));border-bottom:2px solid var(--altin);padding:0 14px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.tb-logo-t{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-t{font-size:15px;font-weight:800;color:var(--altin)}
.kat-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1}
.kat-row::-webkit-scrollbar{display:none}
.kb{padding:5px 12px;border-radius:20px;border:1px solid var(--b);background:transparent;color:var(--silik);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.kb.ak{background:linear-gradient(135deg,var(--altin),var(--aac));color:var(--s);border-color:var(--altin)}
.tb-sag{display:flex;align-items:center;gap:8px;flex-shrink:0}
.saat{font-size:16px;font-weight:800;color:var(--altin);font-variant-numeric:tabular-nums}
.stok-ac-btn{padding:5px 10px;border-radius:8px;border:1px solid var(--b);background:transparent;color:var(--silik);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.stok-ac-btn.kritik{border-color:var(--kirmizi);color:var(--kirmizi);background:rgba(192,57,43,.1)}
.main{flex:1;overflow:hidden;display:flex}
@media(max-width:700px){.main{flex-direction:column;overflow-y:auto}}
.sutun{flex:1;border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;min-width:0}
.sutun:last-child{border-right:none}
.sh{padding:9px 12px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sh-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.sh-badge{padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700}
.sb-y{background:rgba(192,57,43,.2);color:#E57373;border:1px solid rgba(192,57,43,.3)}
.sb-i{background:rgba(232,149,42,.2);color:var(--uyari);border:1px solid rgba(232,149,42,.3)}
.sb-o{background:rgba(212,160,23,.2);color:var(--altin);border:1px solid rgba(212,160,23,.3)}
.sutun-ic{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
.sutun-ic::-webkit-scrollbar{width:3px}
.sutun-ic::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
/* S\İPAR\İ\Ş KARTI */
.spk{border-radius:10px;padding:11px 12px;margin-bottom:7px;border:1.5px solid var(--b);background:var(--sm);position:relative}
.spk::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.spk.yeni{border-color:rgba(192,57,43,.4)}.spk.yeni::before{background:var(--kirmizi)}
.spk.islem{border-color:rgba(232,149,42,.35)}.spk.islem::before{background:var(--uyari)}
.spk.hazir{border-color:rgba(45,106,45,.4);background:rgba(45,106,45,.08)}.spk.hazir::before{background:var(--yesil)}
.spk-ust{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.spk-masa{font-size:15px;font-weight:800}
.spk-dk{font-size:11px;font-weight:600;padding:2px 7px;border-radius:7px}
.dk-ok{background:rgba(212,160,23,.15);color:var(--altin)}
.dk-gec{background:rgba(232,149,42,.2);color:var(--uyari)}
.dk-kritik{background:rgba(192,57,43,.2);color:#E57373}
@keyframes titres{0%,100%{opacity:1}50%{opacity:.4}}
.dk-kritik{animation:titres 1s ease-in-out infinite}
.spk-g{font-size:10px;color:var(--silik);margin-bottom:6px}
.sp-urun{display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:7px;background:rgba(255,255,255,.04);margin-bottom:3px}
.su-em{font-size:16px;flex-shrink:0}
.su-ad{font-size:12px;font-weight:600;flex:1}
.su-adet{font-size:12px;font-weight:800;color:var(--altin)}
.su-not{font-size:10px;color:var(--altin);margin-top:1px}
.spk-not{background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.2);border-radius:7px;padding:5px 9px;margin:6px 0;font-size:11px;color:var(--altin)}
.spk-btns{display:flex;gap:5px;margin-top:8px}
.spk-btn{flex:1;padding:8px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:4px}
.spk-btn:active{transform:scale(.96)}
.btn-basla{background:linear-gradient(135deg,var(--uyari),#C87010);color:#fff}
.btn-hazir{background:linear-gradient(135deg,var(--yesil),#1E4D1E);color:#fff}
.btn-iptal{background:rgba(192,57,43,.15);color:#E57373;border:1px solid rgba(192,57,43,.3);flex:0;padding:8px 10px}
/* \ÖZET */
.oz-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px}
.oz-k{background:var(--sm);border-radius:10px;padding:10px;border:1px solid var(--b);text-align:center}
.oz-s{font-size:20px;font-weight:800;color:var(--altin)}
.oz-e{font-size:9px;color:var(--silik);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.uretim-satir{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:8px;background:var(--sm);border:1px solid var(--b);margin:0 8px 5px}
.us-em{font-size:18px;flex-shrink:0}
.us-ad{font-size:11px;font-weight:600;flex:1}
.us-adet{font-size:14px;font-weight:800;color:var(--altin)}
.us-bar{height:3px;background:rgba(212,160,23,.1);border-radius:2px;margin-top:3px;overflow:hidden}
.us-bar-ic{height:100%;background:linear-gradient(90deg,var(--altin),var(--aac));border-radius:2px}
/* STOK */
.stok-satir{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;background:var(--sm);border:1px solid var(--b);margin:0 8px 5px}
.stok-satir.k{border-color:rgba(192,57,43,.4);background:rgba(192,57,43,.06)}
.stok-satir.u{border-color:rgba(232,149,42,.35);background:rgba(232,149,42,.05)}
.stk-em{font-size:18px;flex-shrink:0}
.stk-ad{font-size:11px;font-weight:600;flex:1}
.stk-m{font-size:12px;font-weight:700;flex-shrink:0}
.stok-satir.k .stk-m{color:#E57373}
.stok-satir.u .stk-m{color:var(--uyari)}
.stok-satir.n .stk-m{color:#81C784}
.stk-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:3px;overflow:hidden}
.stk-bar-ic{height:100%;border-radius:2px}
.stok-satir.k .stk-bar-ic{background:#E57373}
.stok-satir.u .stk-bar-ic{background:var(--uyari)}
.stok-satir.n .stk-bar-ic{background:#81C784}
.bos{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;color:var(--silik);font-size:12px;gap:8px}
.bos span{font-size:28px}
/* FLASH */
@keyframes fGir{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}
.flash{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--yesil),#1E4D1E);border:1px solid rgba(45,106,45,.4);color:#fff;padding:9px 18px;border-radius:10px;font-size:12px;font-weight:700;z-index:200;pointer-events:none;display:none;white-space:nowrap}
.flash.ak{display:block;animation:fGir 3s ease forwards}
.flash.yeni-sp{background:linear-gradient(135deg,var(--kirmizi),#8B1A1A)}
.flash.kritik-uyari{background:linear-gradient(135deg,#E57373,var(--kirmizi))}
/* STOK PANEL\İ */
.stok-panel-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center}
.stok-panel-bg.ak{display:flex}
.stok-panel{background:var(--sm);border-radius:18px;padding:22px;width:min(540px,95vw);max-height:85vh;overflow-y:auto;border:1px solid rgba(212,160,23,.3)}
.sp-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sp-ht{font-size:16px;font-weight:800;color:var(--altin)}
.sp-kapat{cursor:pointer;color:var(--silik);font-size:20px;line-height:1}
.stok-gir-satir{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.stok-gir-satir:last-child{border-bottom:none}
.sg-em{font-size:22px;flex-shrink:0}
.sg-bilgi{flex:1}
.sg-ad{font-size:13px;font-weight:600;color:var(--metin)}
.sg-alt{font-size:10px;color:var(--silik);margin-top:1px}
.sg-kontrol{display:flex;align-items:center;gap:6px}
.sg-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(212,160,23,.3);background:rgba(212,160,23,.1);color:var(--altin);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.sg-inp{width:64px;padding:5px;border-radius:7px;border:1px solid rgba(212,160,23,.3);background:rgba(255,255,255,.05);color:var(--metin);font-size:13px;font-weight:700;text-align:center;outline:none}
.sg-birim{font-size:10px;color:var(--silik);width:24px;flex-shrink:0}
.sp-kaydet{width:100%;margin-top:14px;padding:12px;border-radius:12px;background:linear-gradient(135deg,var(--altin),var(--aac));color:var(--s);border:none;font-size:13px;font-weight:800;cursor:pointer}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo-t">
    <span style="font-size:20px">\?\?\‍\?\?</span>

  </div>

    <div class="kb ak" onclick="katSec('tumu',this)">T\üm\ü</div>

    <div class="stok-ac-btn" id="stok-ac-btn" onclick="stokPanelAc()">\?\? Stok</div>
  </div>
</div>

<div class="main">
  <!-- S\ÜTUN 1: YEN\İ -->
  <div class="sutun">
    <div class="sh"><span style="font-size:14px">\?\?</span><div class="sh-t">Yeni</div><div class="sh-badge sb-y" id="b-yeni">0</div></div>
    <div class="sutun-ic" id="ic-yeni"></div>
  </div>
  <!-- S\ÜTUN 2: HAZIRLANIYOR -->
  <div class="sutun">
    <div class="sh"><span style="font-size:14px">\?\?</span><div class="sh-t">Haz\ırlan\ıyor</div><div class="sh-badge sb-i" id="b-islem">0</div></div>
    <div class="sutun-ic" id="ic-islem"></div>
  </div>
  <!-- S\ÜTUN 3: \ÖZET -->
  <div class="sutun">
    <div class="sh"><span style="font-size:14px">\?\?</span><div class="sh-t">\Özet</div><div class="sh-badge sb-o" id="b-ozet">0 porsiyon</div></div>
    <div class="sutun-ic" id="ic-ozet"></div>
  </div>
</div>

<div class="flash" id="flash"></div>

<!-- STOK PANEL\İ -->
<div class="stok-panel-bg" id="stok-panel-bg" onclick="stokPanelBgKapat(event)">
  <div class="stok-panel">
    <div class="sp-h">
      <div class="sp-ht">\?\? Stok G\üncelle</div>
      <div class="sp-kapat" onclick="stokPanelKapat()">\✕</div>
    </div>
    <div id="stok-ic"></div>
    <button class="sp-kaydet" onclick="stokKaydet()">\✅ Kaydet ve Kapat</button>
  </div>
</div>

<script>

const _URL="https://vdrjyngywjzuniwvsjtk.supabase.co",_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg",_H={"apikey":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg","Authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg","Content-Type":"application/json"};
const SB={
  async get(t,q){try{const r=await fetch(_URL+"/rest/v1/"+t+"?"+(q||""),{headers:_H});return r.ok?r.json():[]}catch(e){return[]}},
  async post(t,d){try{const r=await fetch(_URL+"/rest/v1/"+t,{method:"POST",headers:{..._H,"Prefer":"return=representation"},body:JSON.stringify(d)});return r.json()}catch(e){return null}},
  async patch(t,q,d){try{const r=await fetch(_URL+"/rest/v1/"+t+"?"+q,{method:"PATCH",headers:{..._H,"Prefer":"return=representation"},body:JSON.stringify(d)});return r.json()}catch(e){return null}},
  async del(t,q){try{await fetch(_URL+"/rest/v1/"+t+"?"+q,{method:"DELETE",headers:_H})}catch(e){}}
};
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function urunStr(u){
  if(!u)return"";
  if(typeof u==="string"){try{u=JSON.parse(u)}catch(e){return u}}
  if(!Array.isArray(u))return"";
  return u.map(function(x){return(x.em||"")+" "+(x.ad||x)+" x"+(x.adet||1)}).join(", ");
}


var MENULER = {
  'Adana Kebap':{em:'\?\?',kat:'Izgara'},
  'Tavuk Sis':{em:'\?\?',kat:'Izgara'},
  'Kofte':{em:'\?\?',kat:'Izgara'},
  'Kasarli Pide':{em:'\?\?',kat:'Pide'},
  'Lahmacun':{em:'\?\?',kat:'Pide'},
  'Etli Pide':{em:'\?\?',kat:'Pide'},
  'Mercimek Corbasi':{em:'\?\?',kat:'Corbalar'},
  'Ezogelin':{em:'\?\?',kat:'Corbalar'},
  'Baklava':{em:'\?\?',kat:'Tatlilar'},
  'Sutlac':{em:'\?\?',kat:'Tatlilar'},
  'Kadayif':{em:'\?\?',kat:'Tatlilar'},
  'Ayran':{em:'\?\?',kat:'Icecekler'},
  'Salgam':{em:'\?\?',kat:'Icecekler'},
  'Kola':{em:'\?\?',kat:'Icecekler'},
  'Cay':{em:'\?\?',kat:'Icecekler'}
};

var STOK_DUSUR = {
  'Adana Kebap':{'Dana Kiyma':0.25},
  'Tavuk Sis':{'Tavuk Gogsu':0.2},
  'Kofte':{'Dana Kiyma':0.15,'Sogan':0.05},
  'Kasarli Pide':{'Un':0.1},
  'Lahmacun':{'Un':0.08,'Dana Kiyma':0.1,'Domates':0.1},
  'Etli Pide':{'Un':0.1,'Dana Kiyma':0.15},
  'Sutlac':{'Sutlac Malz.':1},
  'Cay':{'Cay':1}
};

var siparisler = [];

var uretim = {
  'Adana Kebap':8,'Tavuk Sis':6,'Kofte':4,'Kasarli Pide':11,
  'Lahmacun':9,'Mercimek Corbasi':14,'Baklava':7,'Ayran':22,'Cay':31
};

var stok = [
  {em:'\?\?',ad:'Dana Kiyma',miktar:3.2,max:10,birim:'kg',sinir:3},
  {em:'\?\?',ad:'Tavuk Gogsu',miktar:4.5,max:8,birim:'kg',sinir:2},
  {em:'\?\?',ad:'Un',miktar:8,max:20,birim:'kg',sinir:4},
  {em:'\?\?',ad:'Sogan',miktar:2.1,max:5,birim:'kg',sinir:1},
  {em:'\?\?',ad:'Domates',miktar:0.8,max:4,birim:'kg',sinir:1},
  {em:'\?\?',ad:'Zeytinyagi',miktar:1.5,max:5,birim:'lt',sinir:1},
  {em:'\?\?',ad:'Sutlac Malz.',miktar:6,max:10,birim:'porsiyon',sinir:3},
  {em:'\?\?',ad:'Cay',miktar:12,max:30,birim:'porsiyon',sinir:5}
];

var aktifKat = 'tumu';

// SAAT
setInterval(function(){
  var n = new Date();
  var el = document.getElementById('saat');
  if(el) el.textContent =
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
}, 1000);

// Dakika sayac\ı
setInterval(function(){
  for(var i=0;i<siparisler.length;i++){
    if(siparisler[i].durum !== 'hazir') siparisler[i].dk++;
  }
  eskalasyonKontrol();
  render();
}, 60000);

// KATEGOR\İ
function katSec(kat, el){
  aktifKat = kat;
  var btns = document.querySelectorAll('.kb');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('ak');
  el.classList.add('ak');
  render();
}

function spKatEsles(sp){
  if(aktifKat === 'tumu') return true;
  for(var i=0;i<sp.urunler.length;i++){
    var u = sp.urunler[i];
    var m = MENULER[u.ad];
    if(m && m.kat === aktifKat) return true;
  }
  return false;
}

function dkClass(dk){
  if(dk >= 15) return 'dk-kritik';
  if(dk >= 8)  return 'dk-gec';
  return 'dk-ok';
}

// S\İPAR\İ\Ş KARTI HTML
function spKartHtml(sp){
  var kat = aktifKat === 'tumu' ? sp.urunler : sp.urunler.filter(function(u){
    var m = MENULER[u.ad];
    return m && m.kat === aktifKat;
  });

  var urunHtml = '';
  for(var i=0;i<kat.length;i++){
    var u = kat[i];
    var m = MENULER[u.ad] || {em:'\?\?\️'};
    urunHtml += '<div class="sp-urun">' +
      '<div class="su-em">' + m.em + '</div>' +
      '<div style="flex:1"><div class="su-ad">' + u.ad + '</div>' +
      (u.not ? '<div class="su-not">\?\? ' + u.not + '</div>' : '') +
      '</div><div class="su-adet">x' + u.adet + '</div></div>';
  }

  var notHtml = sp.not ? '<div class="spk-not">\?\? ' + sp.not + '</div>' : '';

  var btnHtml = '';
  if(sp.durum === 'yeni'){
    btnHtml = '<button class="spk-btn btn-basla" data-id="' + sp.id + '" onclick="spBaslaBtn(this)">\▶ Ba\şla</button>' +
              '<button class="spk-btn btn-iptal" data-id="' + sp.id + '" onclick="spIptalBtn(this)">\✕</button>';
  } else {
    btnHtml = '<button class="spk-btn btn-hazir" data-id="' + sp.id + '" onclick="spHazirBtn(this)">\✅ Haz\ır \— Garson \Ça\ğ\ır</button>';
  }

  return '<div class="spk ' + sp.durum + '">' +
    '<div class="spk-ust"><div class="spk-masa">Masa ' + sp.masa + '</div>' +
    '<div class="spk-dk ' + dkClass(sp.dk) + '">' + sp.dk + ' dk</div></div>' +
    '<div class="spk-g">Garson: ' + sp.garson + '</div>' +
    urunHtml + notHtml +
    '<div class="spk-btns">' + btnHtml + '</div></div>';
}

// AKS\İYONLAR
function spBasla(id){
  var sp = siparisler.find(function(x){return x.id===id;});
  if(!sp) return;
  sp.durum = 'islem';
  sipDurumDB(id,'hazirlaniyor').catch(function(){});
  ses('basla');
  flashGoster('Masa ' + sp.masa + ' hazirlaniyor...', '');
  render();
}

function spHazir(id){
  var sp = siparisler.find(function(x){return x.id===id;});
  if(!sp) return;
  sp.durum = 'hazir';
  sipDurumDB(id,'hazir').catch(function(){});
  SB.patch('masalar','no=eq.'+sp.masa,{durum:'hazir',updated_at:new Date().toISOString()}).catch(function(){});
  // \Üretim art\ır + stok d\ü\ş\ür
  for(var i=0;i<sp.urunler.length;i++){
    var u = sp.urunler[i];
    uretim[u.ad] = (uretim[u.ad]||0) + u.adet;
    var dusur = STOK_DUSUR[u.ad] || {};
    var stokAdlar = Object.keys(dusur);
    for(var j=0;j<stokAdlar.length;j++){
      var stokAd = stokAdlar[j];
      var miktar = dusur[stokAd];
      var stokItem = null;
      for(var k=0;k<stok.length;k++){
        if(stok[k].ad === stokAd){ stokItem = stok[k]; break; }
      }
      if(stokItem) stokItem.miktar = Math.max(0, +(stokItem.miktar - miktar*u.adet).toFixed(2));
    }
  }
  ses('hazir');
  flashGoster('Masa ' + sp.masa + ' HAZIR! Garson bildirildi \?\?', '');
  setTimeout(function(){
    siparisler = siparisler.filter(function(x){return x.id!==id;});
    render();
  }, 3000);
  render();
}

function spIptal(id){
  siparisler = siparisler.filter(function(x){return x.id!==id;});
  render();
}

// ESKALASYON
function eskalasyonKontrol(){
  for(var i=0;i<siparisler.length;i++){
    var sp = siparisler[i];
    if(sp.durum === 'yeni' && sp.dk >= 15 && !sp.eskalasyon){
      sp.eskalasyon = true;
      ses('kritik');
      flashGoster('KR\İT\İK: Masa ' + sp.masa + ' ' + sp.dk + ' dakikadir bekliyor!', 'kritik-uyari');
    }
  }
}

// SES
var audioCtx = null;
function ses(tip){
  try {
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    var t = audioCtx.currentTime;
    if(tip === 'yeni'){
      osc.frequency.setValueAtTime(880,t);
      osc.frequency.setValueAtTime(0,t+.1);
      osc.frequency.setValueAtTime(880,t+.2);
      osc.frequency.setValueAtTime(0,t+.3);
      osc.frequency.setValueAtTime(880,t+.4);
      gain.gain.setValueAtTime(.3,t);
      gain.gain.setValueAtTime(0,t+.5);
      osc.start(t); osc.stop(t+.55);
    } else if(tip === 'hazir'){
      osc.frequency.setValueAtTime(523,t);
      osc.frequency.setValueAtTime(659,t+.15);
      osc.frequency.setValueAtTime(784,t+.3);
      gain.gain.setValueAtTime(.3,t);
      gain.gain.exponentialRampToValueAtTime(.001,t+.6);
      osc.start(t); osc.stop(t+.65);
    } else if(tip === 'basla'){
      osc.frequency.value = 440;
      gain.gain.setValueAtTime(.2,t);
      gain.gain.exponentialRampToValueAtTime(.001,t+.25);
      osc.start(t); osc.stop(t+.28);
    } else if(tip === 'kritik'){
      osc.stop(); // bu osc kullanma
      var freqs = [1200,1200,1200,1200];
      for(var i=0;i<freqs.length;i++){
        (function(fi){
          var o2 = audioCtx.createOscillator();
          var g2 = audioCtx.createGain();
          o2.connect(g2); g2.connect(audioCtx.destination);
          o2.frequency.value = freqs[fi];
          g2.gain.setValueAtTime(.25, t+fi*.15);
          g2.gain.setValueAtTime(0, t+fi*.15+.1);
          o2.start(t+fi*.15); o2.stop(t+fi*.15+.12);
        })(i);
      }
      return;
    }
  } catch(e){}
}

// FLASH
var flashTimer = null;
function flashGoster(msg, tip){
  var el = document.getElementById('flash');
  el.textContent = msg;
  el.className = 'flash ak' + (tip ? ' ' + tip : '');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(function(){ el.className = 'flash'; }, 3000);
}

// STOK PANEL\İ
function stokPanelAc(){
  var ic = document.getElementById('stok-ic');
  var html = '';
  for(var i=0;i<stok.length;i++){
    var s = stok[i];
    html += '<div class="stok-gir-satir">' +
      '<div class="sg-em">' + s.em + '</div>' +
      '<div class="sg-bilgi"><div class="sg-ad">' + s.ad + '</div>' +
      '<div class="sg-alt">Max: ' + s.max + ' ' + s.birim + ' \· Uyari: ' + s.sinir + '</div></div>' +
      '<div class="sg-kontrol">' +
      '<div class="sg-btn" onclick="stokDeg(' + i + ',-0.5)">\−</div>' +
      '<input class="sg-inp" id="sg-' + i + '" type="number" value="' + s.miktar + '" min="0" max="' + s.max + '" step="0.1" onchange="stokInpDeg(' + i + ',this.value)">' +
      '<div class="sg-btn" onclick="stokDeg(' + i + ',0.5)">+</div>' +
      '<div class="sg-birim">' + s.birim + '</div>' +
      '</div></div>';
  }
  ic.innerHTML = html;
  document.getElementById('stok-panel-bg').classList.add('ak');
}

function stokDeg(i, delta){
  stok[i].miktar = Math.max(0, Math.min(stok[i].max, +(stok[i].miktar+delta).toFixed(1)));
  var inp = document.getElementById('sg-'+i);
  if(inp) inp.value = stok[i].miktar;
}

function stokInpDeg(i, val){
  stok[i].miktar = Math.max(0, Math.min(stok[i].max, parseFloat(val)||0));
}

function stokKaydet(){
  // Input de\ğerlerini oku
  for(var i=0;i<stok.length;i++){
    var inp = document.getElementById('sg-'+i);
    if(inp) stok[i].miktar = Math.max(0, Math.min(stok[i].max, parseFloat(inp.value)||0));
  }
  stokPanelKapat();
  flashGoster('Stok guncellendi!', '');
  render();
}

function stokPanelKapat(){
  document.getElementById('stok-panel-bg').classList.remove('ak');
}

function stokPanelBgKapat(e){
  if(e.target === document.getElementById('stok-panel-bg')) stokPanelKapat();
}

// RENDER
function render(){
  var yeni = siparisler.filter(function(s){return s.durum==='yeni' && spKatEsles(s);});
  var islem = siparisler.filter(function(s){return s.durum==='islem' && spKatEsles(s);});
  yeni.sort(function(a,b){return b.dk-a.dk;});
  islem.sort(function(a,b){return b.dk-a.dk;});

  document.getElementById('b-yeni').textContent = yeni.length;
  document.getElementById('b-islem').textContent = islem.length;

  // Stok uyar\ıs\ı
  var kritikSay = stok.filter(function(s){return s.miktar<=s.sinir;}).length;
  var btn = document.getElementById('stok-ac-btn');
  if(kritikSay > 0){
    btn.className = 'stok-ac-btn kritik';
    btn.textContent = '\⚠\️ ' + kritikSay + ' Kritik';
  } else {
    btn.className = 'stok-ac-btn';
    btn.textContent = '\?\? Stok';
  }

  // S\ütunlar
  var yeniHtml = '';
  for(var i=0;i<yeni.length;i++) yeniHtml += spKartHtml(yeni[i]);
  document.getElementById('ic-yeni').innerHTML = yeniHtml ||
    '<div class="bos"><span>\✅</span>Yeni siparis yok</div>';

  var islemHtml = '';
  for(var i=0;i<islem.length;i++) islemHtml += spKartHtml(islem[i]);
  document.getElementById('ic-islem').innerHTML = islemHtml ||
    '<div class="bos"><span>\?\?\‍\?\?</span>Hazirlanan yok</div>';

  // \Özet
  var toplamUretim = 0;
  var uretimAdlar = Object.keys(uretim);
  for(var i=0;i<uretimAdlar.length;i++) toplamUretim += uretim[uretimAdlar[i]];
  document.getElementById('b-ozet').textContent = toplamUretim + ' porsiyon';

  var geciken = yeni.filter(function(s){return s.dk>=10;}).length;
  var ozHtml = '<div class="oz-grid">' +
    '<div class="oz-k"><div class="oz-s">' + (yeni.length+islem.length) + '</div><div class="oz-e">Aktif</div></div>' +
    '<div class="oz-k"><div class="oz-s" style="color:#E57373">' + geciken + '</div><div class="oz-e">Geciken</div></div>' +
    '<div class="oz-k"><div class="oz-s">' + toplamUretim + '</div><div class="oz-e">Porsiyon</div></div>' +
    '<div class="oz-k"><div class="oz-s" style="color:#81C784">\₺' + Math.round(toplamUretim*42/1000*10)/10 + 'B</div><div class="oz-e">Ciro</div></div>' +
    '</div>';

  // En \çok \üretilen
  var uretimSirali = Object.entries(uretim).sort(function(a,b){return b[1]-a[1];}).slice(0,7);
  var maxU = uretimSirali[0] ? uretimSirali[0][1] : 1;
  for(var i=0;i<uretimSirali.length;i++){
    var ad = uretimSirali[i][0], sayi = uretimSirali[i][1];
    var m = MENULER[ad] || {em:'\?\?\️'};
    var yuzde = Math.round(sayi/maxU*100);
    ozHtml += '<div class="uretim-satir">' +
      '<div class="us-em">' + m.em + '</div>' +
      '<div style="flex:1"><div class="us-ad">' + ad + '</div>' +
      '<div class="us-bar"><div class="us-bar-ic" style="width:' + yuzde + '%"></div></div></div>' +
      '<div class="us-adet">' + sayi + '</div></div>';
  }

  // Stok
  var stokSirali = stok.slice().sort(function(a,b){
    var aS = a.miktar<=a.sinir?0:a.miktar<=a.sinir*2?1:2;
    var bS = b.miktar<=b.sinir?0:b.miktar<=b.sinir*2?1:2;
    return aS-bS;
  });
  ozHtml += '<div style="font-size:10px;font-weight:700;color:var(--silik);text-transform:uppercase;letter-spacing:.06em;padding:10px 9px 6px;border-top:1px solid var(--b);margin-top:4px">Stok</div>';
  for(var i=0;i<stokSirali.length;i++){
    var s = stokSirali[i];
    var cls = s.miktar<=s.sinir?'k':s.miktar<=s.sinir*2?'u':'n';
    var yb = Math.round(s.miktar/s.max*100);
    var durum = s.miktar<=s.sinir?'KR\İT\İK':s.miktar<=s.sinir*2?'Az':'\✓';
    ozHtml += '<div class="stok-satir ' + cls + '">' +
      '<div class="stk-em">' + s.em + '</div>' +
      '<div style="flex:1"><div style="display:flex;justify-content:space-between">' +
      '<div class="stk-ad">' + s.ad + '</div>' +
      '<div style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:5px;' +
      (cls==='k'?'background:rgba(192,57,43,.2);color:#E57373':cls==='u'?'background:rgba(232,149,42,.15);color:var(--uyari)':'background:rgba(45,106,45,.15);color:#81C784') +
      '">' + durum + '</div></div>' +
      '<div class="stk-bar"><div class="stk-bar-ic" style="width:' + yb + '%"></div></div></div>' +
      '<div class="stk-m">' + s.miktar + ' ' + s.birim + '</div></div>';
  }

  document.getElementById('ic-ozet').innerHTML = ozHtml;
}

async function sipDurumDB(id, durum){
  await SB.patch('siparisler','id=eq.'+id,{durum:durum,updated_at:new Date().toISOString()});
}

async function siparisleriDBden(){
  try {
    var data = await SB.get('siparisler','durum=in.(yeni,hazirlaniyor,islem)&order=created_at.asc');
    if(!data || !data.length){ siparisler=[]; render(); return; }
    siparisler = data.map(function(s){
      var arr = [];
      var u = s.urunler;
      if(u){
        if(typeof u==='string'){try{u=JSON.parse(u)}catch(e){u=[]}}
        if(Array.isArray(u)) arr = u.map(function(x){
          if(typeof x==='string') return{ad:x,adet:1,not:''};
          return{ad:x.ad||'',adet:x.adet||1,not:x.not||''};
        });
      }
      var masaAd = parseInt(s.masa_no)===0 ? (s.garson_ad||'Paket') : s.masa_no;
      return {
        id: String(s.id),
        masa: masaAd,
        garson: parseInt(s.masa_no)===0 ? '' : (s.garson_ad||'-'),
        durum: s.durum==='islem'?'islem':s.durum||'yeni',
        dk: Math.floor((Date.now()-new Date(s.created_at).getTime())/60000),
        eskalasyon: false,
        urunler: arr,
        not: s.not_text||''
      };
    });
    render();
  } catch(e) { console.error(e); }
}
siparisleriDBden();
setInterval(function(){ siparisleriDBden().catch(function(){}); }, 3000);

function spBaslaBtn(b){ var id=b.getAttribute('data-id'); spBasla(id); }
function spHazirBtn(b){ var id=b.getAttribute('data-id'); spHazir(id); }
function spIptalBtn(b){ var id=b.getAttribute('data-id'); spIptal(id); }
