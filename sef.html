<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mutfak</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--al:#D4A017;--bas:#2D6A2D;--teh:#C0392B;--uya:#E8952A;--s:#1A1A1A}
body{font-family:-apple-system,sans-serif;background:#0f0f0f;color:#fff;min-height:100vh}
.hdr{background:#1a1a1a;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--al);position:sticky;top:0;z-index:10}
.hdr-t{font-size:15px;font-weight:800;color:#fff}
.saat{font-size:18px;font-weight:800;color:var(--al);font-variant-numeric:tabular-nums}
.top-sag{display:flex;align-items:center;gap:8px}
.badge{padding:4px 10px;border-radius:8px;background:rgba(212,160,23,.15);color:var(--al);font-size:11px;font-weight:700}
.stok-btn{padding:5px 10px;border-radius:8px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);font-size:11px;cursor:pointer}
.durum-bar{display:flex;gap:8px;padding:8px 12px;background:#141414;border-bottom:1px solid rgba(255,255,255,.06);overflow-x:auto}
.dur-k{padding:5px 12px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
.dur-k.ak{background:var(--al);color:#000}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 90px)}
.col{display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.06)}
.col:last-child{border-right:none}
.col-h{padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid rgba(255,255,255,.06)}
.col-h.yeni{color:#ff8a80;background:rgba(192,57,43,.08)}
.col-h.islem{color:#ffcc80;background:rgba(232,149,42,.08)}
.col-ic{flex:1;overflow-y:auto;padding:8px}
.sp{border-radius:12px;padding:12px;margin-bottom:8px;border:2px solid;transition:opacity .2s}
.sp.yeni{background:rgba(192,57,43,.06);border-color:rgba(192,57,43,.4)}
.sp.islem{background:rgba(232,149,42,.06);border-color:rgba(232,149,42,.4)}
.sp-ust{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.sp-masa{font-size:17px;font-weight:800;line-height:1.2}
.sp-dk{font-size:11px;padding:2px 8px;border-radius:7px;font-weight:700;flex-shrink:0}
.sp-dk.ok{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.sp-dk.war{background:rgba(232,149,42,.25);color:#ffcc80}
.sp-dk.crit{background:rgba(192,57,43,.3);color:#ff8a80;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.sp-garson{font-size:10px;color:rgba(255,255,255,.4);margin-bottom:6px}
.sp-urunler{margin-bottom:6px}
.sp-urun-satir{font-size:12px;color:rgba(255,255,255,.8);padding:2px 0;display:flex;align-items:center;gap:6px}
.sp-not{font-size:11px;color:var(--uya);padding:5px 8px;border-radius:6px;background:rgba(232,149,42,.08);margin-bottom:8px;border-left:2px solid var(--uya)}
.sp-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sp-btn{padding:9px;border-radius:9px;border:none;font-size:12px;font-weight:700;cursor:pointer;width:100%}
.sp-btn.basla{background:linear-gradient(135deg,var(--uya),#b36000);color:#fff}
.sp-btn.hazir{background:linear-gradient(135deg,var(--bas),#1a3d1a);color:#fff}
.sp-btn.iptal{background:rgba(192,57,43,.2);color:#ff8a80;border:1px solid rgba(192,57,43,.3)}
.bos{text-align:center;padding:40px 20px;color:rgba(255,255,255,.2);font-size:13px}
.flash{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1a2a1a;color:#6fcf6f;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;border:1px solid var(--bas);z-index:100;display:none;max-width:90vw;text-align:center}
.stok-panel{position:fixed;right:0;top:0;width:280px;height:100vh;background:#161616;border-left:2px solid var(--al);padding:14px;overflow-y:auto;display:none;z-index:200}
.stok-panel.ak{display:block}
.stok-pt{font-size:14px;font-weight:800;color:var(--al);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.stok-satir{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.stok-bilgi{flex:1}
.stok-ad{font-size:12px;font-weight:600}
.stok-miktar{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.stok-ad.kritik{color:#ff8a80}
.stok-inp{width:60px;padding:4px 7px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;font-size:11px;outline:none}
.stok-ekle{padding:4px 8px;border-radius:6px;background:var(--bas);color:#fff;border:none;font-size:11px;cursor:pointer}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-t">👨‍🍳 Mutfak Ekranı</div>
    <div style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px">Her 3 sn güncellenir</div>
  </div>
  <div class="top-sag">
    <div class="badge" id="sp-say">0 sipariş</div>
    <button class="stok-btn" onclick="stokToggle()">📦 Stok</button>
    <div class="saat" id="saat">00:00:00</div>
  </div>
</div>
<div class="cols">
  <div class="col">
    <div class="col-h yeni">🆕 Yeni Siparişler</div>
    <div class="col-ic" id="yeni-ic"></div>
  </div>
  <div class="col">
    <div class="col-h islem">⏳ Hazırlanıyor</div>
    <div class="col-ic" id="islem-ic"></div>
  </div>
</div>
<div class="flash" id="flash"></div>
<div class="stok-panel" id="stok-panel">
  <div class="stok-pt">
    <span>📦 Stok Girişi</span>
    <span onclick="stokToggle()" style="cursor:pointer;font-size:18px;color:rgba(255,255,255,.4)">✕</span>
  </div>
  <div id="stok-ic"></div>
</div>
<script>

const _URL="https://vdrjyngywjzuniwvsjtk.supabase.co",_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg",_H={"apikey":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg","Authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg","Content-Type":"application/json"};
const SB={
  async get(t,q){try{const r=await fetch(_URL+"/rest/v1/"+t+"?"+(q||""),{headers:_H});return r.ok?r.json():[]}catch(e){return[]}},
  async post(t,d){try{const r=await fetch(_URL+"/rest/v1/"+t,{method:"POST",headers:{..._H,"Prefer":"return=representation"},body:JSON.stringify(d)});return r.json()}catch(e){return null}},
  async patch(t,q,d){try{const r=await fetch(_URL+"/rest/v1/"+t+"?"+q,{method:"PATCH",headers:{..._H,"Prefer":"return=representation"},body:JSON.stringify(d)});return r.json()}catch(e){return null}},
  async del(t,q){try{await fetch(_URL+"/rest/v1/"+t+"?"+q,{method:"DELETE",headers:_H})}catch(e){}}
};
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function urunStr(u){
  if(!u)return"";
  if(typeof u==="string"){try{u=JSON.parse(u)}catch(e){return u}}
  if(!Array.isArray(u))return"";
  return u.map(function(x){return(x.em||"")+" "+(x.ad||x)+" x"+(x.adet||1)}).join(", ");
}

var SPS = [];
var STOK = [];

// Saat
setInterval(function(){
  var n=new Date();
  document.getElementById("saat").textContent=
    pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());
},1000);
function pad(n){return String(n).padStart(2,"0")}

// Ana yükleme
async function yukle(){
  var d=await SB.get("siparisler","durum=in.(yeni,hazirlaniyor,islem)&order=created_at.asc");
  if(!d) return;
  SPS=d.map(function(s){
    var masaAd=parseInt(s.masa_no)===0?(s.garson_ad||"📦 Paket"):"Masa "+s.masa_no;
    return{
      id:s.id,
      masa:masaAd,
      garson:parseInt(s.masa_no)===0?"":(s.garson_ad||"-"),
      durum:s.durum==="islem"?"islem":s.durum||"yeni",
      dk:Math.floor((Date.now()-new Date(s.created_at).getTime())/60000),
      urunler:parseUrunArray(s.urunler),
      not:s.not_text||""
    };
  });
  render();
}

function parseUrunArray(u){
  if(!u) return [];
  if(typeof u==="string"){try{u=JSON.parse(u)}catch(e){return[]}}
  if(!Array.isArray(u)) return [];
  return u.map(function(x){
    if(typeof x==="string") return{em:"",ad:x,adet:1};
    return{em:x.em||"",ad:x.ad||"",adet:x.adet||1};
  });
}

function render(){
  var yeni=SPS.filter(function(s){return s.durum==="yeni";});
  var islem=SPS.filter(function(s){return s.durum==="hazirlaniyor"||s.durum==="islem";});
  document.getElementById("sp-say").textContent=(yeni.length+islem.length)+" sipariş";
  document.getElementById("yeni-ic").innerHTML=yeni.length?yeni.map(spKartYeni).join(""):"<div class='bos'>✅ Yeni sipariş yok</div>";
  document.getElementById("islem-ic").innerHTML=islem.length?islem.map(spKartIslem).join(""):"<div class='bos'>Hazırlanıyor yok</div>";
}

function dkRenk(dk){return dk>=15?"crit":dk>=8?"war":"ok"}

function spKartYeni(s){
  var urunHtml=s.urunler.map(function(u){
    return "<div class='sp-urun-satir'>"+(u.em?u.em+" ":"")+"<span>"+u.ad+"</span> <b>x"+u.adet+"</b></div>";
  }).join("");
  return "<div class='sp yeni'>"
    +"<div class='sp-ust'><div class='sp-masa'>"+s.masa+"</div><div class='sp-dk "+dkRenk(s.dk)+"'>"+s.dk+" dk</div></div>"
    +(s.garson?"<div class='sp-garson'>"+s.garson+"</div>":"")
    +(urunHtml?"<div class='sp-urunler'>"+urunHtml+"</div>":"")
    +(s.not?"<div class='sp-not'>"+s.not+"</div>":"")
    +"<div class='sp-btns'>"
    +"<button class='sp-btn basla' data-id='"+s.id+"' onclick='basla(this)'>▶ Hazırlamaya Başla</button>"
    +"<button class='sp-btn iptal' data-id='"+s.id+"' onclick='iptal(this)'>✕ İptal</button>"
    +"</div></div>";
}

function spKartIslem(s){
  var urunHtml=s.urunler.map(function(u){
    return "<div class='sp-urun-satir'>"+(u.em?u.em+" ":"")+"<span>"+u.ad+"</span> <b>x"+u.adet+"</b></div>";
  }).join("");
  return "<div class='sp islem'>"
    +"<div class='sp-ust'><div class='sp-masa'>"+s.masa+"</div><div class='sp-dk "+dkRenk(s.dk)+"'>"+s.dk+" dk</div></div>"
    +(s.garson?"<div class='sp-garson'>"+s.garson+"</div>":"")
    +(urunHtml?"<div class='sp-urunler'>"+urunHtml+"</div>":"")
    +(s.not?"<div class='sp-not'>"+s.not+"</div>":"")
    +"<button class='sp-btn hazir' data-id='"+s.id+"' data-masa='"+s.masa+"' onclick='hazir(this)'>✅ Hazır — Servise Gönder</button>"
    +"</div>";
}

async function basla(btn){
  var id=btn.getAttribute("data-id");
  btn.disabled=true; btn.textContent="...";
  await SB.patch("siparisler","id=eq."+id,{durum:"hazirlaniyor",updated_at:new Date().toISOString()});
  flash("Hazırlanıyor...");
  await yukle();
}

async function hazir(btn){
  var id=btn.getAttribute("data-id");
  var masa=btn.getAttribute("data-masa");
  btn.disabled=true; btn.textContent="...";
  await SB.patch("siparisler","id=eq."+id,{durum:"hazir",updated_at:new Date().toISOString()});
  // Masa tablosunu güncelle (paket değilse)
  if(masa&&masa.startsWith("Masa ")){
    var no=masa.replace("Masa ","");
    await SB.patch("masalar","no=eq."+no,{durum:"hazir",updated_at:new Date().toISOString()});
  }
  flash(masa+" HAZIR! 🔔");
  await yukle();
}

async function iptal(btn){
  var id=btn.getAttribute("data-id");
  btn.disabled=true;
  await SB.patch("siparisler","id=eq."+id,{durum:"iptal",updated_at:new Date().toISOString()});
  flash("İptal edildi.");
  await yukle();
}

var flashT;
function flash(msg){
  var el=document.getElementById("flash");
  el.textContent=msg; el.style.display="block";
  clearTimeout(flashT);
  flashT=setTimeout(function(){el.style.display="none";},3000);
}

// STOK
var stokAk=false;
function stokToggle(){
  stokAk=!stokAk;
  document.getElementById("stok-panel").classList.toggle("ak",stokAk);
  if(stokAk) stokYukle();
}

async function stokYukle(){
  var d=await SB.get("stok","order=ad.asc");
  if(d) STOK=d;
  stokRender();
}

function stokRender(){
  var el=document.getElementById("stok-ic");
  if(!STOK.length){el.innerHTML="<div style='color:rgba(255,255,255,.3);font-size:12px;padding:10px'>Stok yok</div>";return;}
  el.innerHTML=STOK.map(function(s){
    var kr=parseFloat(s.miktar)<=parseFloat(s.sinir||0);
    var sid="si_"+s.ad.replace(/[^a-zA-Z0-9]/g,"_");
    return "<div class='stok-satir'>"
      +"<span style='font-size:16px'>"+(s.em||"📦")+"</span>"
      +"<div class='stok-bilgi'><div class='stok-ad"+(kr?" kritik":"")+"'>"+s.ad+"</div>"
      +"<div class='stok-miktar'>"+s.miktar+" "+s.birim+"</div></div>"
      +"<input class='stok-inp' id='"+sid+"' type='number' min='0' step='0.1' placeholder='+'>"
      +"<button class='stok-ekle' data-ad='"+s.ad+"' data-inp='"+sid+"' onclick='stokEkle(this)'>+</button>"
      +"</div>";
  }).join("");
}

async function stokEkle(btn){
  var ad=btn.getAttribute("data-ad");
  var inp=document.getElementById(btn.getAttribute("data-inp"));
  if(!inp) return;
  var m=parseFloat(inp.value);
  if(!m||m<=0) return;
  var s=STOK.find(function(x){return x.ad===ad;});
  if(!s) return;
  var yeni=parseFloat(s.miktar)+m;
  await SB.patch("stok","ad=eq."+encodeURIComponent(ad),{miktar:yeni,updated_at:new Date().toISOString()});
  inp.value="";
  flash(ad+": "+yeni+" "+s.birim);
  await stokYukle();
}

yukle();
setInterval(yukle,3000);
</script>
</body>
</html>
