<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MEER'S — Paket Servis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --s:#1A1A1A;--sm:#2C2C2C;--al:#D4A017;--aac:#F0C040;
  --bas:#2D6A2D;--bac:#E8F5E8;--teh:#C0392B;--tac:#FDECEA;
  --uya:#E8952A;--uac:#FEF0E0;--mt:#1A1A1A;--si:#9A7B65;
  --kr:#FDF6EE;--bd:#EDD9C0;--yz:#FFF8F2;--ik:#F5E6D3;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--kr);min-height:100vh}
.topbar{background:linear-gradient(135deg,var(--s),var(--sm));padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--al)}
.tb-t{font-size:16px;font-weight:800;color:#fff}
.btn{padding:8px 16px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer}
.btn-al{background:linear-gradient(135deg,var(--al),var(--aac));color:var(--s)}
.btn-ik{background:var(--ik);color:var(--si)}
.btn-ik2{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2)}
.wrap{display:grid;grid-template-columns:1fr 380px;gap:0;height:calc(100vh - 52px)}
@media(max-width:700px){.wrap{grid-template-columns:1fr;height:auto}}
.sol{overflow-y:auto;padding:12px;border-right:1px solid var(--bd)}
.sag{background:var(--yz);overflow-y:auto;padding:12px;display:flex;flex-direction:column}
.bolum{margin-bottom:16px}
.bolum-t{font-size:11px;font-weight:700;color:var(--si);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.tip-sec{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.tip-k{border-radius:12px;padding:14px;text-align:center;cursor:pointer;border:2px solid var(--bd);background:var(--yz)}
.tip-k.ak{border-color:var(--al);background:var(--ik)}
.tip-em{font-size:28px;margin-bottom:4px}
.tip-ad{font-size:13px;font-weight:700;color:var(--mt)}
.tip-ac{font-size:11px;color:var(--si);margin-top:2px}
.inp{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--bd);font-size:13px;background:var(--yz);color:var(--mt);outline:none;margin-bottom:8px}
.inp:focus{border-color:var(--al)}
.kat-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.kat-btn{padding:6px 12px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;background:var(--ik);color:var(--si)}
.kat-btn.ak{background:var(--s);color:var(--al)}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:500px){.menu-grid{grid-template-columns:1fr}}
.menu-k{background:var(--yz);border-radius:12px;border:1.5px solid var(--bd);padding:10px;cursor:pointer;display:flex;align-items:center;gap:8px}
.menu-k:hover{border-color:var(--al)}
.menu-k.secili{border-color:var(--al);background:var(--ik)}
.menu-em{font-size:22px;flex-shrink:0}
.menu-ad{font-size:12px;font-weight:700;color:var(--mt)}
.menu-fiyat{font-size:11px;color:var(--al);font-weight:700;margin-top:2px}
.sepet-bos{text-align:center;padding:24px;color:var(--si);font-size:13px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sepet-bos span{font-size:32px;display:block;margin-bottom:8px}
.sepet-satir{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.ss-ad{flex:1;font-size:13px;color:var(--mt)}
.ss-kontrol{display:flex;align-items:center;gap:6px}
.ss-btn{width:26px;height:26px;border-radius:7px;border:1px solid var(--bd);background:var(--yz);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mt)}
.ss-adet{font-size:13px;font-weight:700;color:var(--mt);min-width:20px;text-align:center}
.ss-fiyat{font-size:13px;font-weight:700;color:var(--al);min-width:50px;text-align:right}
.toplam-bar{border-top:2px solid var(--bd);padding-top:10px;margin-top:auto}
.toplam-satir{display:flex;justify-content:space-between;font-size:14px;padding:4px 0}
.toplam-satir.buyuk{font-size:18px;font-weight:800;color:var(--mt);margin-top:4px}
.siparis-btn{width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,var(--al),var(--aac));color:var(--s);border:none;font-size:15px;font-weight:800;cursor:pointer;margin-top:10px}
.siparis-btn:disabled{opacity:.5;cursor:not-allowed}
.sure-sec{display:flex;gap:6px;flex-wrap:wrap}
.sure-k{padding:6px 12px;border-radius:8px;border:1.5px solid var(--bd);background:var(--yz);font-size:11px;font-weight:700;cursor:pointer;color:var(--si)}
.sure-k.ak{border-color:var(--al);background:var(--ik);color:var(--mt)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--s);color:#fff;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:200;border:1px solid var(--al);display:none;white-space:nowrap}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-t">🛵 Paket Servis</div>
  <button class="btn btn-ik2" onclick="history.back()">← Geri</button>
</div>

<div class="wrap">
  <!-- SOL: Müşteri Bilgi + Menü -->
  <div class="sol">
    <div class="bolum">
      <div class="bolum-t">Sipariş Tipi</div>
      <div class="tip-sec">
        <div class="tip-k ak" id="tip-gel" onclick="tipSec('gel')">
          <div class="tip-em">🏃</div>
          <div class="tip-ad">Gel Al</div>
          <div class="tip-ac">Müşteri gelip alır</div>
        </div>
        <div class="tip-k" id="tip-teslimat" onclick="tipSec('teslimat')">
          <div class="tip-em">🛵</div>
          <div class="tip-ad">Eve Teslimat</div>
          <div class="tip-ac">Adrese gönderilir</div>
        </div>
      </div>
    </div>

    <div class="bolum">
      <div class="bolum-t">Müşteri Bilgileri</div>
      <input class="inp" id="mst-ad" placeholder="Müşteri Adı Soyadı">
      <input class="inp" id="mst-tel" placeholder="Telefon (05XX XXX XX XX)" type="tel">
      <div id="adres-wrap" style="display:none">
        <input class="inp" id="mst-adres" placeholder="Teslimat Adresi">
      </div>
      <div class="bolum-t" style="margin-top:8px">Tahmini Süre</div>
      <div class="sure-sec" id="sure-sec">
        <div class="sure-k ak" onclick="sureSec(this,'15')">15 dk</div>
        <div class="sure-k" onclick="sureSec(this,'20')">20 dk</div>
        <div class="sure-k" onclick="sureSec(this,'30')">30 dk</div>
        <div class="sure-k" onclick="sureSec(this,'45')">45 dk</div>
        <div class="sure-k" onclick="sureSec(this,'60')">60 dk</div>
      </div>
      <input class="inp" id="mst-not" placeholder="Sipariş Notu (isteğe bağlı)" style="margin-top:8px">
    </div>

    <div class="bolum">
      <div class="bolum-t">Menü</div>
      <div class="kat-nav" id="kat-nav"></div>
      <div class="menu-grid" id="menu-grid"></div>
    </div>
  </div>

  <!-- SAĞ: Sepet -->
  <div class="sag">
    <div class="bolum-t">Sepet</div>
    <div id="sepet-ic" class="sepet-bos">
      <span>🛒</span>
      Menüden ürün seçin
    </div>
    <div class="toplam-bar" id="toplam-bar" style="display:none">
      <div class="toplam-satir"><span>Ara Toplam</span><span id="ara-toplam">₺0</span></div>
      <div class="toplam-satir" id="teslimat-satir" style="display:none"><span>Teslimat Ücreti</span><span>₺15</span></div>
      <div class="toplam-satir buyuk"><span>Toplam</span><span id="genel-toplam">₺0</span></div>
      <button class="siparis-btn" id="siparis-btn" onclick="siparisVer()">📦 Siparişi Onayla</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const SUPA_URL = "https://vdrjyngywjzuniwvsjtk.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg";
const SB = {
  h: {
    "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg",
    "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcmp5bmd5d2p6dW5pd3ZzanRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Nzc4MTMsImV4cCI6MjA5MDQ1MzgxM30.pD2vQT62f7XM7yFe_yuddPhJhfRg_1biCZ8ImV4LRjg",
    "Content-Type": "application/json"
  },
  async get(t, q) {
    try {
      const r = await fetch(SUPA_URL+"/rest/v1/"+t+"?"+(q||""), {headers:this.h});
      if(!r.ok) return [];
      return await r.json();
    } catch(e) { console.error("SB.get hatasi:", e); return []; }
  },
  async post(t, d) {
    try {
      const r = await fetch(SUPA_URL+"/rest/v1/"+t, {
        method:"POST",
        headers:Object.assign({},this.h,{"Prefer":"return=representation"}),
        body:JSON.stringify(d)
      });
      return await r.json();
    } catch(e) { console.error("SB.post hatasi:", e); return null; }
  },
  async patch(t, q, d) {
    try {
      const r = await fetch(SUPA_URL+"/rest/v1/"+t+"?"+q, {
        method:"PATCH",
        headers:Object.assign({},this.h,{"Prefer":"return=representation"}),
        body:JSON.stringify(d)
      });
      return await r.json();
    } catch(e) { console.error("SB.patch hatasi:", e); return null; }
  },
  async del(t, q) {
    try {
      await fetch(SUPA_URL+"/rest/v1/"+t+"?"+q, {method:"DELETE",headers:this.h});
    } catch(e) { console.error("SB.del hatasi:", e); }
  }
};
function parseUrunler(u) {
  if(!u) return [];
  if(typeof u === "string") { try { u = JSON.parse(u); } catch(e) { return []; } }
  if(!Array.isArray(u)) return [];
  return u.map(function(x) {
    if(typeof x === "string") return {ad:x, adet:1, em:"", not:""};
    return {ad:x.ad||"", adet:x.adet||1, em:x.em||"", not:x.not||""};
  });
}
function urunMetin(urunler) {
  var arr = parseUrunler(urunler);
  if(!arr.length) return "Siparis yok";
  return arr.map(function(u) { return (u.em?" ":"") + u.ad + " x" + u.adet; }).join(", ");
}

var menuListesi = [];
var sepet = {};
var aktifKat = 'Tumu';
var aktifTip = 'gel';
var aktifSure = '15';
var TESLIMAT_UCRETI = 15;

async function baslat(){
  var d = await SB.get('menu','aktif=eq.true&order=kat.asc,ad.asc');
  if(d && d.length) menuListesi = d;
  renderKatlar();
  renderMenu();
}

function tipSec(tip){
  aktifTip = tip;
  document.getElementById('tip-gel').classList.toggle('ak', tip==='gel');
  document.getElementById('tip-teslimat').classList.toggle('ak', tip==='teslimat');
  document.getElementById('adres-wrap').style.display = tip==='teslimat'?'block':'none';
  document.getElementById('teslimat-satir').style.display = tip==='teslimat'?'flex':'none';
  renderToplam();
}

function sureSec(el, sure){
  aktifSure = sure;
  document.querySelectorAll('.sure-k').forEach(function(k){ k.classList.remove('ak'); });
  el.classList.add('ak');
}

function renderKatlar(){
  var katlar = ['Tumu'];
  menuListesi.forEach(function(u){ if(katlar.indexOf(u.kat)<0) katlar.push(u.kat); });
  var html = '';
  katlar.forEach(function(k){
    html += '<button class="kat-btn'+(k===aktifKat?' ak':'')+'" data-kat="'+k+'" onclick="katSecBtn(this)">'+(k==='Tumu'?'Tumu':k)+'</button>';
  });
  document.getElementById('kat-nav').innerHTML = html;
}
function katSecBtn(btn){
  katSec(btn.getAttribute('data-kat'));
}

function katSec(kat){
  aktifKat = kat;
  renderKatlar();
  renderMenu();
}

function renderMenu(){
  var items = aktifKat==='Tumu' ? menuListesi : menuListesi.filter(function(u){ return u.kat===aktifKat; });
  var html = '';
  items.forEach(function(u){
    var adet = sepet[u.id] ? sepet[u.id].adet : 0;
    var resim = u.image_url ? '<img src="'+u.image_url+'" style="width:40px;height:40px;border-radius:8px;object-fit:cover">' : '<div class="menu-em">'+(u.em||'🍽️')+'</div>';
    var badge = adet>0 ? '<div style="margin-left:auto;background:var(--al);color:var(--s);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">'+adet+'</div>' : '';
    html += '<div class="menu-k'+(adet>0?' secili':'')+'" data-id="'+u.id+'" data-ad="'+u.ad.replace(/"/g,'')+'" data-em="'+(u.em||'')+'" data-fiyat="'+u.fiyat+'" onclick="ekleBtn(this)">';
    html += resim;
    html += '<div><div class="menu-ad">'+u.ad+'</div><div class="menu-fiyat">₺'+u.fiyat+'</div></div>';
    html += badge + '</div>';
  });
  document.getElementById('menu-grid').innerHTML = html;
}
function ekleBtn(btn){
  var id=btn.getAttribute('data-id');
  var ad=btn.getAttribute('data-ad');
  var em=btn.getAttribute('data-em');
  var fiyat=parseFloat(btn.getAttribute('data-fiyat'));
  ekle(id,ad,em,fiyat);
}


function azaltSepet(btn){ azalt(btn.getAttribute('data-id')); }
function ekleSepet(btn){ ekle(btn.getAttribute('data-id'),btn.getAttribute('data-ad'),btn.getAttribute('data-em'),parseFloat(btn.getAttribute('data-fiyat'))); }
</script>
</body>
</html>
